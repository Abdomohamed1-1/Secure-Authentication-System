<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق من الهوية</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>أدخل كود التحقق (Authenticator Code)</h2>
    <form method="POST" action="/auth/verify-2fa">
        <input type="hidden" name="username" value="{{ username }}">
        <input type="text" name="code" placeholder="000000" required>
        <button type="submit">تحقق ودخول</button>
    </form>
</body>
</html>
