<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h2><i class="fas fa-user-circle"></i> لوحة التحكم</h2>
        <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
            <p>مرحباً، <strong>{{ username }}</strong></p>
            <p>الإيميل: {{ email }}</p>
            <p>صلاحيتك: <span class="badge">{{ role }}</span></p>
        </div>

        <h3 style="text-align:right; font-size: 1.1em;">الوصول السريع:</h3>
        <div style="text-align:right; margin-bottom: 20px;">
            <ul style="list-style: none; padding: 0;">
                <li style="margin: 10px 0;"><a href="/profile"><i class="fas fa-home"></i> الصفحة الرئيسية</a></li>
                
                {% if role == 'Admin' %}
                <li style="margin: 10px 0;"><a href="/admin-area" style="color: #e74c3c;"><i class="fas fa-user-shield"></i> منطقة المسؤولين فقط</a></li>
                {% endif %}
                
                {% if role == 'Manager' or role == 'Admin' %}
                <li style="margin: 10px 0;"><a href="/manager-area" style="color: #2980b9;"><i class="fas fa-tasks"></i> إدارة النظام</a></li>
                {% endif %}
            </ul>
        </div>

        <a href="/auth/logout" style="color: #7f8c8d; font-weight: bold;">تسجيل الخروج</a>
    </div>
</body>
</html>
